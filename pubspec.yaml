name: form_manager
description: "Mobile Google Forms companion app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Google APIs & Auth
  googleapis: ^16.0.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.2

  # Functional programming
  dartz: ^0.10.1

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local database
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # File system
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Sharing
  share_plus: ^10.1.3

  # URL launching
  url_launcher: ^6.3.1

  # Web view
  webview_flutter: ^4.10.0

  # Loading skeletons
  shimmer: ^3.0.0

  # HTTP
  http: ^1.6.0

  # SVG rendering
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation (dev only)
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true

  assets:
    - assets/login_banner.svg
    - assets/google_icon.svg
    - assets/dashboard_form_icon.svg
    - assets/dashboard_hamburger.svg
    - assets/dashboard_premium.svg
    - assets/dashboard_no_form_banner.svg
